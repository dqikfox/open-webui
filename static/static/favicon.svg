<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="250" cy="250" r="240" fill="url(#grad1)" filter="url(#shadow)"/>
  
  <!-- "o" letter -->
  <circle cx="170" cy="250" r="80" fill="none" stroke="white" stroke-width="40"/>
  
  <!-- "i" letter -->
  <rect x="310" y="180" width="40" height="140" rx="20" fill="white"/>
  <circle cx="330" cy="140" r="20" fill="white"/>
</svg>
