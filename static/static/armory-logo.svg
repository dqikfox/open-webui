<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="armoryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#cc0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#990000;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Shield -->
  <path d="M250 50 L400 120 L400 300 Q400 400 250 450 Q100 400 100 300 L100 120 Z" 
        fill="none" stroke="url(#armoryGradient)" stroke-width="8" filter="url(#glow)"/>
  
  <!-- Inner Shield -->
  <path d="M250 90 L360 145 L360 280 Q360 360 250 400 Q140 360 140 280 L140 145 Z" 
        fill="rgba(10,10,10,0.8)" stroke="url(#armoryGradient)" stroke-width="4"/>
  
  <!-- A Letter -->
  <g fill="url(#armoryGradient)" filter="url(#glow)">
    <polygon points="250,170 220,280 235,280 245,240 255,240 265,280 280,280"/>
    <rect x="240" y="220" width="20" height="8"/>
  </g>
  
  <!-- Circuit Lines -->
  <g stroke="#ff3333" stroke-width="2" opacity="0.6">
    <line x1="180" y1="200" x2="220" y2="200"/>
    <line x1="280" y1="200" x2="320" y2="200"/>
    <line x1="200" y1="250" x2="230" y2="250"/>
    <line x1="270" y1="250" x2="300" y2="250"/>
    <circle cx="180" cy="200" r="3" fill="#ff0000"/>
    <circle cx="320" cy="200" r="3" fill="#ff0000"/>
    <circle cx="200" cy="250" r="3" fill="#ff0000"/>
    <circle cx="300" cy="250" r="3" fill="#ff0000"/>
  </g>
  
  <!-- ARMORY Text -->
  <text x="250" y="350" font-family="Arial, sans-serif" font-size="42" font-weight="bold" 
        fill="url(#armoryGradient)" text-anchor="middle" filter="url(#glow)">ARMORY</text>
</svg>
