<!DOCTYPE html>
<html>
<head>
    <title>OASIS Auth Debug</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: Arial; }
        input { background: #1a1a1a; border: 2px solid #ff0000; color: #fff; padding: 10px; margin: 10px; display: block; }
        button { background: #ff0000; color: #fff; padding: 10px 20px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>OASIS Auth Test</h1>
    <form action="/api/v1/auths/signup" method="POST">
        <input type="text" name="name" placeholder="Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Create Account</button>
    </form>
    <script>
        console.log('Auth debug page loaded');
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('click', () => console.log('Input clicked:', input.name));
        });
    </script>
</body>
</html>
