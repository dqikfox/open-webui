version: '3.8'

services:
  oasis-cuda:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    image: oasis:cuda13
    container_name: oasis-cuda
    ports:
      - "8080:8080"
    volumes:
      - oasis-data:/app/backend/data
      - ./backend:/app/backend
      - ./src:/app/src
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_EMBEDDING_ENGINE=sentence-transformers
      - RAG_EMBEDDING_MODEL=all-MiniLM-L6-v2
      - USE_CUDA=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - oasis-network

  ollama-cuda:
    image: ollama/ollama:latest
    container_name: ollama-cuda
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - oasis-network

volumes:
  oasis-data:
  ollama-data:

networks:
  oasis-network:
    driver: bridge
