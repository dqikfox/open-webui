<!-- ARMORY Visual Effects Overlay -->
<style>
  .armory-effects {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9998;
    overflow: hidden;
  }
  
  .scanline {
    position: absolute;
    width: 100%;
    height: 2px;
    background: linear-gradient(to bottom, transparent, rgba(255, 0, 0, 0.5), transparent);
    animation: scanline-move 8s linear infinite;
  }
  
  @keyframes scanline-move {
    from { top: -2px; }
    to { top: 100%; }
  }
  
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: #ff0000;
    border-radius: 50%;
    box-shadow: 0 0 10px #ff0000;
    opacity: 0;
  }
  
  @keyframes particle-rise {
    0% {
      transform: translateY(100vh) translateX(0) scale(0);
      opacity: 0;
    }
    10% {
      opacity: 0.8;
      transform: translateY(90vh) translateX(10px) scale(1);
    }
    90% {
      opacity: 0.8;
    }
    100% {
      transform: translateY(-10vh) translateX(var(--x-offset)) scale(0);
      opacity: 0;
    }
  }
  
  .vignette {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, transparent 0%, rgba(10, 10, 10, 0.7) 100%);
    pointer-events: none;
    z-index: 1;
  }
</style>

<div class="armory-effects">
  <!-- Scanline effect -->
  <div class="scanline"></div>
  
  <!-- Particle effects (generated by JavaScript) -->
  <div id="particles"></div>
</div>

<!-- Vignette overlay -->
<div class="vignette"></div>

<script>
  // Generate floating particles
  (function() {
    const particlesContainer = document.getElementById('particles');
    if (!particlesContainer) return;
    
    const particleCount = 30;
    
    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      
      // Random starting position
      const startX = Math.random() * 100;
      const endX = Math.random() * 200 - 100; // -100 to 100
      const delay = Math.random() * 5;
      const duration = 15 + Math.random() * 10;
      
      particle.style.left = `${startX}%`;
      particle.style.setProperty('--x-offset', `${endX}px`);
      particle.style.animation = `particle-rise ${duration}s linear ${delay}s infinite`;
      
      particlesContainer.appendChild(particle);
    }
    
    // Add corner accents
    const corners = ['top-left', 'top-right', 'bottom-left', 'bottom-right'];
    corners.forEach(corner => {
      const accent = document.createElement('div');
      accent.className = `corner-accent ${corner}`;
      accent.innerHTML = `
        <svg width="100" height="100" style="position: absolute;">
          <path d="M 5 5 L 5 40 M 5 5 L 40 5" 
                stroke="#ff0000" 
                stroke-width="2" 
                fill="none"
                style="filter: drop-shadow(0 0 5px #ff0000)"/>
          <circle cx="5" cy="5" r="3" fill="#ff0000" 
                  style="filter: drop-shadow(0 0 8px #ff0000)"/>
        </svg>
      `;
      accent.style.position = 'fixed';
      accent.style.pointerEvents = 'none';
      accent.style.zIndex = '9999';
      accent.style.opacity = '0.6';
      
      if (corner.includes('top')) accent.style.top = '10px';
      if (corner.includes('bottom')) {
        accent.style.bottom = '10px';
        accent.style.transform = 'rotate(90deg)';
      }
      if (corner.includes('left')) accent.style.left = '10px';
      if (corner.includes('right')) {
        accent.style.right = '10px';
        if (corner === 'top-right') accent.style.transform = 'rotate(-90deg)';
        if (corner === 'bottom-right') accent.style.transform = 'rotate(180deg)';
      }
      
      document.body.appendChild(accent);
    });
  })();
</script>
