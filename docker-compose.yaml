services:
  ollama:
    volumes:
      - /media/ultro/CK1/models:/root/.ollama/models
      - ollama:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}

  oasis:
    build:
      context: .
      args:
        OLLAMA_BASE_URL: '/ollama'
      dockerfile: Dockerfile
    image: ghcr.io/oasis/oasis:${WEBUI_DOCKER_TAG-main}
    container_name: oasis
    volumes:
      - oasis:/app/backend/data
      - ./backend/open_webui:/app/backend/open_webui
    depends_on:
      - ollama
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    environment:
      - 'WEBUI_NAME=ARMORY'
      - 'OLLAMA_BASE_URL=http://ollama:11434'
      - 'WEBUI_SECRET_KEY='
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

volumes:
  ollama: {}
  oasis: {}
